name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: test ${{ matrix.os }} / py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.8", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install .
      - name: Unit tests
        run: python -m unittest discover -s tests -v
      - name: Selftest
        run: clauditor --selftest
      - name: Demo runs (clean must pass --ci)
        shell: bash
        run: |
          clauditor examples/clean --no-user --ci
          clauditor examples/messy --no-user --format md
