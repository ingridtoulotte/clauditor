<svg xmlns="http://www.w3.org/2000/svg" width="900" height="706" viewBox="0 0 900 706" font-family="ui-monospace, SFMono-Regular, 'JetBrains Mono', 'Fira Code', Menlo, Consolas, 'Liberation Mono', monospace" font-size="14">
  <!-- window -->
  <rect x="0.5" y="0.5" width="899" height="705" rx="10" fill="#0d1117" stroke="#30363d"/>
